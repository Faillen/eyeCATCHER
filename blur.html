<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eyeCATCHER - Break</title>
    <script type="module" src="/src/blur.ts" defer></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: 'Inter', -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .blur-fullscreen {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.92);
      }

      .blur-content {
        text-align: center;
        color: #f5f5f5;
      }

      .blur-content h2 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 40px;
        color: #d4af6a;
      }

      .blur-countdown-circle {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 3px solid #b8954a;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 40px;
        animation: pulse 1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); border-color: #b8954a; }
        50% { transform: scale(1.05); border-color: #d4af6a; }
      }

      #blur-countdown-number {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 4rem;
        font-weight: 700;
        color: #f5f5f5;
      }

      .blur-content p {
        font-size: 1.1rem;
        color: #999999;
        max-width: 400px;
        margin: 0 auto;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="blur-fullscreen">
      <div class="blur-content">
        <h2>Look away for 20 seconds</h2>
        <div class="blur-countdown-circle">
          <span id="blur-countdown-number">20</span>
        </div>
        <p>Rest your eyes by looking at something 20 feet away</p>
      </div>
    </div>
  </body>
</html>
