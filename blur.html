<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eyeCATCHER - Break</title>
    <script type="module" src="/src/blur.ts" defer></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a1a;
        font-family: 'Inter', -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .blur-fullscreen {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
      }

      .blur-content {
        text-align: center;
        color: #f5f5f5;
      }

      .blur-countdown-line {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      #blur-countdown-number {
        font-family: 'Inter', sans-serif;
        font-size: 5rem;
        font-weight: 800;
        color: #ffffff;
        line-height: 1;
      }

      .blur-countdown-unit {
        font-family: 'Inter', sans-serif;
        font-size: 1.4rem;
        font-weight: 600;
        color: #cccccc;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .blur-message {
        font-family: 'Inter', sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        color: #d4af6a;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="blur-fullscreen">
      <div class="blur-content">
        <div class="blur-countdown-line">
          <span id="blur-countdown-number">20</span>
          <span class="blur-countdown-unit">secs</span>
        </div>
        <p class="blur-message">time to take a break</p>
      </div>
    </div>
  </body>
</html>
